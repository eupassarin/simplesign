name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Pack & Publish NuGet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity quiet

      - name: Pack
        run: >-
          dotnet pack --no-build --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
          --output nupkgs

      - name: Push to NuGet.org
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "NUGET_API_KEY not configured. Skipping push to NuGet.org"
            exit 0
          fi
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbols
        shell: bash
        run: |
          shopt -s nullglob
          files=(nupkgs/*.snupkg)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No symbol packages found. Skipping symbol push."
            exit 0
          fi

          dotnet nuget push "${files[@]}" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
        continue-on-error: true

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ steps.version.outputs.version }}
          path: nupkgs/

  agent:
    name: Publish Agent (Tauri)
    runs-on: windows-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: src/SimpleSign.Agent
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src/SimpleSign.Agent
          tagName: ${{ github.ref_name }}
          releaseName: SimpleSign ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false

  cli:
    name: Publish CLI
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish CLI (win-x64)
        run: |
          dotnet publish src/SimpleSign.Cli/SimpleSign.Cli.csproj \
            -c Release \
            -f net8.0 \
            -p:Version=${{ steps.version.outputs.version }} \
            -o publish-cli

      - name: Create CLI ZIP
        run: |
          cd publish-cli
          zip -r ../simplesign-cli-win-x64.zip .

      - name: Upload CLI to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: simplesign-cli-win-x64.zip
